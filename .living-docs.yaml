# Living Documentation Configuration

# Code sources to watch
sources:
  - src/**/*.py
  - lib/**/*.ts

# Documentation directories
docs:
  - docs/
  - README.md

# Staleness thresholds (days)
staleness:
  warning: 30
  critical: 90

